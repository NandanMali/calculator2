<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<link rel="stylesheet" href="bootstrap-3.4.1-dist/css/bootstrap.min.css">
<link rel="stylesheet" href="cal.css">

<script src="jquery-4.0.0.js"></script>
<script src="bootstrap-3.4.1-dist/js/bootstrap.min.js"></script>
<script src="cal.js"></script>

</head>
<body>
    <div class="container" id="contain">
        <div>
            <input type="text" id="output" class="form-control" >
        </div>
        <div class="row" id="rows">
            <div class="col-md-3"><button ><p><a href="">AC</a></p></button></div>
            <div class="col-md-3"><button id="chn1" onclick="cal('%');change('%');" id="%"><p>%</p></button></div>
            <div class="col-md-3"><button onclick="cal('X');change('X');" id="X"><p>X</p></button></div>
            <div class="col-md-3"><button id="chn2" onclick="cal('/');change('/');" id="/"  ><p>/</p></button></div>
        </div>

        <div class="row" id="rows">
            <div class="col-md-3"><button onclick="cal(7)"><p>7</p></button></div>
            <div class="col-md-3"><button onclick="cal(8)"><p>8</p></button></div>
            <div class="col-md-3"><button onclick="cal(9)"><p>9</p></button></div>
            <div class="col-md-3"><button onclick="cal('*');change('*');" id="*"><p>*</p></button></div>
        </div>

        <div class="row" id="rows">
            <div class="col-md-3"><button onclick="cal(4)"><p>4</p></button></div>
            <div class="col-md-3"><button onclick="cal(5)"><p>5</p></button></div>
            <div class="col-md-3"><button onclick="cal(6)"><p>6</p></button></div>
            <div class="col-md-3"><button onclick="cal('-');change('-');" id="-"><p>-</p></button></div>
        </div>

        <div class="row" id="rows">
            <div class="col-md-3"><button onclick="cal(1)"><p>1</p></button></div>
            <div class="col-md-3"><button onclick="cal(2)"><p>2</p></button></div>
            <div class="col-md-3"><button onclick="cal(3)"><p>3</p></button></div>
            <div class="col-md-3"><button onclick="cal('+');change('+');" id="+"><p>+</p></button></div>
        </div>

        <div class="row" id="rows">
            <div class="col-md-3"><button onclick="cal('00')"><p>00</p></button></div>
            <div class="col-md-3"><button onclick="cal(0)"><p>0</p></button></div>
            <div class="col-md-3"><button onclick="cal('.')"><p>.</p></button></div>
            <div class="col-md-3"><button onclick="cal('=');change('=');" id="="><p>=</p></button></div>
        </div>

    </div>
</body>
</html>
